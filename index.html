<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGE - 26º BPM | Sistema de Gestão de Efetivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 3px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slide-in-from-bottom-4 {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes slide-in-from-right-8 {
      from { transform: translateX(32px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .animate-in {
      animation: fade-in 0.2s ease-out;
    }
    
    .slide-in-from-bottom-4 {
      animation: slide-in-from-bottom-4 0.3s ease-out;
    }
    
    .slide-in-from-right-8 {
      animation: slide-in-from-right-8 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="app"></div>

  <script>
    // ============================================
    // DADOS INICIAIS E CONSTANTES
    // ============================================
    
    const PATENTES = [
      "Sd PM", "Cb PM", "3º Sgt PM", "2º Sgt PM", "1º Sgt PM", 
      "Subten PM", "Asp Of PM", "2º Ten PM", "1º Ten PM", 
      "Cap PM", "Maj PM", "Ten Cel PM"
    ];

    const INITIAL_DATA = [
      { id: 1, ordem: 1, matricula: "50.123-4", cpf: "111.111.111-11", patente: "Cap PM", nome: "Roberto Almeida da Costa", guerra: "R. Costa", funcao: "Cmte Cia", telefone: "21 99999-1111", status: "Ativo" },
      { id: 2, ordem: 2, matricula: "61.333-2", cpf: "222.222.222-22", patente: "1º Ten PM", nome: "Fernanda Montenegro Silva", guerra: "Montenegro", funcao: "P/1", telefone: "21 98888-2222", status: "Ativo" },
      { id: 3, ordem: 3, matricula: "77.444-5", cpf: "333.333.333-33", patente: "Subten PM", nome: "Carlos Eduardo Santos", guerra: "C. Eduardo", funcao: "Sargenteante", telefone: "21 97777-3333", status: "Férias" },
      { id: 4, ordem: 4, matricula: "88.555-6", cpf: "444.444.444-44", patente: "3º Sgt PM", nome: "Juliana Paes de Oliveira", guerra: "Paes", funcao: "Patrulha", telefone: "21 96666-4444", status: "Licença" },
      { id: 5, ordem: 5, matricula: "99.111-0", cpf: "555.555.555-55", patente: "Cb PM", nome: "Marcos Vinicius Pereira", guerra: "Vinicius", funcao: "Motorista", telefone: "21 95555-5555", status: "Ativo" },
      { id: 6, ordem: 6, matricula: "10.222-9", cpf: "666.666.666-66", patente: "Sd PM", nome: "Ana Clara Lima", guerra: "Clara", funcao: "Sentinela", telefone: "21 94444-6666", status: "Afastado" }
    ];

    const INITIAL_AUDIENCIAS = [
      { id: 1, data: '2026-04-10', hora: '14:30', local: '1ª Vara Criminal', processo: '0001234-56.2026.8.19.0001', policialIds: [1], status: 'Agendada' },
      { id: 2, data: '2026-04-12', hora: '09:00', local: 'Auditoria Militar', processo: '0009876-54.2026.8.19.0001', policialIds: [2], status: 'Realizada' }
    ];

    const getStatusClasses = (status) => {
      switch (status) {
        case 'Ativo': return 'bg-green-100 text-green-800';
        case 'Férias': return 'bg-yellow-100 text-yellow-800';
        case 'Licença': return 'bg-indigo-100 text-indigo-800';
        case 'Afastado': return 'bg-red-100 text-red-800';
        default: return 'bg-slate-100 text-slate-800';
      }
    };

    const formatCPF = (cpf) => {
      return String(cpf).replace(/(\d{3})(\d)/, '$1.$2')
            .replace(/(\d{3})(\d)/, '$1.$2')
            .replace(/(\d{3})(\d{1,2})/, '$1-$2')
            .replace(/(-\d{2})\d+?$/, '$1');
    };

    const formatMatricula = (matricula) => {
      return String(matricula).replace(/(\d{2})(\d)/, '$1.$2')
                  .replace(/(\d{3})(\d)/, '$1-$2')
                  .replace(/(-\d)\d+?$/, '$1');
    };

    const formatBytes = (bytes, decimals = 2) => {
      if (!+bytes) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    };

    const getInitials = (name) => {
      return name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
    };

    // ============================================
    // ESTADO DA APLICAÇÃO
    // ============================================
    
    let appState = {
      authState: { role: null, user: null },
      activeAdminTab: 'efetivo',
      isMobileMenuOpen: false,
      isSidebarCollapsed: false,
      members: JSON.parse(JSON.stringify(INITIAL_DATA)),
      audiencias: JSON.parse(JSON.stringify(INITIAL_AUDIENCIAS)),
      isLoadingData: false,
      search: '',
      debouncedSearch: '',
      filterStatus: '',
      sortField: 'ordem',
      sortAsc: true,
      isModalOpen: false,
      editingId: null,
      formData: { status: 'Ativo' },
      isAudienciaModalOpen: false,
      editingAudienciaId: null,
      audienciaFormData: { status: 'Agendada', policialIds: [] },
      fichaSearch: '',
      selectedFichaMemberId: null,
      activeFichaSection: null,
      fichaFormData: {},
      toast: null,
      isDraggingAnexo: false
    };

    let searchTimeout = null;
    let fichaSearchTimeout = null;
    let toastTimeout = null;

    // ============================================
    // FUNÇÕES UTILITÁRIAS
    // ============================================

    function generateId() {
      return Date.now();
    }

    function showToast(message, type = 'success') {
      appState.toast = { message, type };
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        appState.toast = null;
        render();
      }, 3000);
      render();
    }

    function setDebouncedSearch(value) {
      appState.search = value;
      if (searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        appState.debouncedSearch = value;
        render();
      }, 300);
    }

    function setDebouncedFichaSearch(value) {
      appState.fichaSearch = value;
      if (fichaSearchTimeout) clearTimeout(fichaSearchTimeout);
      fichaSearchTimeout = setTimeout(() => {
        render();
      }, 300);
    }

    // ============================================
    // FUNÇÕES DE LÓGICA DE NEGÓCIO
    // ============================================

    function handleLogin(auth) {
      appState.authState = auth;
      render();
    }

    function handleLogout() {
      appState.authState = { role: null, user: null };
      appState.activeAdminTab = 'efetivo';
      appState.selectedFichaMemberId = null;
      appState.activeFichaSection = null;
      render();
    }

    function openModal(member) {
      if (member) {
        appState.editingId = member.id;
        appState.formData = { ...member };
      } else {
        appState.editingId = null;
        appState.formData = { status: 'Ativo' };
      }
      appState.isModalOpen = true;
      render();
    }

    function closeModal() {
      appState.isModalOpen = false;
      appState.formData = { status: 'Ativo' };
      appState.editingId = null;
      render();
    }

    function handleSave(e) {
      e.preventDefault();
      const currentMs = generateId();
      
      if (appState.editingId) {
        const newNotification = {
          id: currentMs.toString(),
          message: 'Suas informações funcionais foram atualizadas pelo administrador.',
          date: new Date().toISOString(),
          read: false
        };
        
        appState.members = appState.members.map(m => 
          m.id === appState.editingId 
            ? { ...m, ...appState.formData, notifications: [newNotification, ...(m.notifications || [])] }
            : m
        );
        showToast('Registro atualizado com sucesso!');
      } else {
        const newMember = {
          ...appState.formData,
          id: currentMs,
          ordem: appState.members.length + 1
        };
        appState.members.push(newMember);
        showToast('Novo militar adicionado!', 'success');
      }
      closeModal();
    }

    function handleDelete(id) {
      if (confirm('Tem certeza que deseja remover este registro?')) {
        appState.members = appState.members.filter(m => m.id !== id);
        showToast('Registro removido.', 'danger');
        render();
      }
    }

    function handleSort(field) {
      if (appState.sortField === field) {
        appState.sortAsc = !appState.sortAsc;
      } else {
        appState.sortField = field;
        appState.sortAsc = true;
      }
      render();
    }

    function openAudienciaModal(audiencia) {
      if (audiencia) {
        appState.editingAudienciaId = audiencia.id;
        appState.audienciaFormData = { ...audiencia };
      } else {
        appState.editingAudienciaId = null;
        appState.audienciaFormData = { status: 'Agendada', policialIds: [] };
      }
      appState.isAudienciaModalOpen = true;
      render();
    }

    function closeAudienciaModal() {
      appState.isAudienciaModalOpen = false;
      appState.audienciaFormData = { status: 'Agendada', policialIds: [] };
      appState.editingAudienciaId = null;
      render();
    }

    function handleSaveAudiencia(e) {
      e.preventDefault();
      if (!appState.audienciaFormData.policialIds || appState.audienciaFormData.policialIds.length === 0) {
        showToast('Selecione pelo menos um policial convocado.', 'danger');
        return;
      }
      
      const currentMs = generateId();
      if (appState.editingAudienciaId) {
        appState.audiencias = appState.audiencias.map(a => 
          a.id === appState.editingAudienciaId 
            ? { ...a, ...appState.audienciaFormData }
            : a
        );
        showToast('Audiência atualizada com sucesso!');
      } else {
        const newAudiencia = {
          ...appState.audienciaFormData,
          id: currentMs
        };
        appState.audiencias.push(newAudiencia);
        showToast('Nova audiência adicionada!', 'success');
      }
      closeAudienciaModal();
    }

    function handleAddPolicialToAudiencia(e) {
      const id = Number(e.target.value);
      if (id && !(appState.audienciaFormData.policialIds || []).includes(id)) {
        appState.audienciaFormData = {
          ...appState.audienciaFormData,
          policialIds: [...(appState.audienciaFormData.policialIds || []), id]
        };
      }
      e.target.value = "";
      render();
    }

    function handleRemovePolicialFromAudiencia(id) {
      appState.audienciaFormData = {
        ...appState.audienciaFormData,
        policialIds: (appState.audienciaFormData.policialIds || []).filter(pid => pid !== id)
      };
      render();
    }

    function handleDeleteAudiencia(id) {
      if (confirm('Tem certeza que deseja remover esta audiência?')) {
        appState.audiencias = appState.audiencias.filter(a => a.id !== id);
        showToast('Audiência removida.', 'danger');
        render();
      }
    }

    function handleExportCSV() {
      const filteredAndSortedMembers = getFilteredAndSortedMembers();
      const headers = ["Ordem", "Matrícula", "Patente", "Nome", "Nome Guerra", "Função", "Status"];
      const rows = filteredAndSortedMembers.map(m => [
        m.ordem, m.matricula, m.patente, m.nome, m.guerra, m.funcao, m.status
      ]);
      
      const escapeCSV = (val) => `"${String(val).replace(/"/g, '""')}"`;
      const csvContent = "\uFEFF" 
        + headers.map(escapeCSV).join(",") + "\n" 
        + rows.map(e => e.map(escapeCSV).join(",")).join("\n");

      const link = document.createElement("a");
      link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8," + csvContent));
      link.setAttribute("download", "efetivo_26bpm.csv");
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function handleImportExcel(e) {
      const file = e.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const bstr = evt.target.result;
          const wb = XLSX.read(bstr, { type: 'binary' });
          const wsname = wb.SheetNames[0];
          const ws = wb.Sheets[wsname];
          const data = XLSX.utils.sheet_to_json(ws);

          if (data.length === 0) {
            showToast('A planilha parece estar vazia.', 'danger');
            return;
          }

          const currentMaxId = appState.members.length > 0 ? Math.max(...appState.members.map(m => m.id)) : 0;
          let nextIdForNew = currentMaxId + 1;

          const importedMembers = data.map(row => {
            const findKey = (candidates) => {
              const key = Object.keys(row).find(k => 
                candidates.some(c => k.toLowerCase().trim().includes(c.toLowerCase()))
              );
              return key ? row[key] : undefined;
            };

            const statusRaw = findKey(['status', 'situação', 'situacao', 'estado']) || 'Ativo';
            let status = 'Ativo';
            const sLower = String(statusRaw).toLowerCase();
            if (['férias', 'ferias', 'vacation'].some(s => sLower.includes(s))) status = 'Férias';
            else if (['licença', 'licenca', 'lts'].some(s => sLower.includes(s))) status = 'Licença';
            else if (['afastado', 'away'].some(s => sLower.includes(s))) status = 'Afastado';

            return {
              id: 0,
              ordem: Number(findKey(['ordem', 'nº', 'posicao', 'posição'])) || 0,
              matricula: String(findKey(['matricula', 'matrícula', 'id', 'registro']) || '').trim(),
              cpf: String(findKey(['cpf', 'documento']) || '').trim(),
              patente: String(findKey(['patente', 'grad', 'graduação', 'graduacao', 'posto']) || '').trim(),
              nome: String(findKey(['nome', 'nome completo', 'policial']) || '').trim(),
              guerra: String(findKey(['guerra', 'nome de guerra', 'conhecido']) || '').trim(),
              funcao: String(findKey(['funcao', 'função', 'cargo', 'atribuição']) || '').trim(),
              telefone: String(findKey(['telefone', 'celular', 'contato']) || '').trim(),
              email: String(findKey(['email', 'e-mail', 'correio']) || '').trim(),
              status: status
            };
          });

          const updatedMembers = [...appState.members];
          let importedCount = 0;
          let updatedCount = 0;

          importedMembers.forEach(newM => {
            if (!newM.nome || newM.nome === 'undefined' || newM.nome === '') return;
            
            const existingIndex = updatedMembers.findIndex(m => 
              (newM.matricula && m.matricula === newM.matricula) || 
              (newM.cpf && m.cpf === newM.cpf)
            );

            if (existingIndex >= 0) {
              updatedMembers[existingIndex] = { 
                ...updatedMembers[existingIndex], 
                ...newM, 
                id: updatedMembers[existingIndex].id,
                ordem: newM.ordem || updatedMembers[existingIndex].ordem
              };
              updatedCount++;
            } else {
              updatedMembers.push({ ...newM, id: nextIdForNew++ });
              importedCount++;
            }
          });

          appState.members = updatedMembers.sort((a, b) => a.ordem - b.ordem);
          showToast(`${importedCount} novos membros importados e ${updatedCount} atualizados.`, 'success');
          
          if (e.target) e.target.value = '';
          render();
        } catch (err) {
          console.error('Erro ao importar Excel:', err);
          showToast('Erro ao processar o arquivo Excel.', 'danger');
        }
      };
      reader.readAsBinaryString(file);
    }

    function getFilteredAndSortedMembers() {
      return appState.members
        .filter(item => {
          const searchLower = appState.debouncedSearch.toLowerCase();
          const matchSearch = item.nome.toLowerCase().includes(searchLower) || 
                              item.matricula.includes(searchLower) || 
                              item.funcao.toLowerCase().includes(searchLower);
          
          let matchStatus = true;
          if (appState.filterStatus === 'Ativo') matchStatus = item.status === 'Ativo';
          if (appState.filterStatus === 'Férias') matchStatus = item.status === 'Férias';
          if (appState.filterStatus === 'Afastados') matchStatus = item.status === 'Licença' || item.status === 'Afastado';

          return matchSearch && matchStatus;
        })
        .sort((a, b) => {
          const valA = a[appState.sortField];
          const valB = b[appState.sortField];
          
          const strA = typeof valA === 'string' ? valA.toLowerCase() : valA;
          const strB = typeof valB === 'string' ? valB.toLowerCase() : valB;
          
          if (strA < strB) return appState.sortAsc ? -1 : 1;
          if (strA > strB) return appState.sortAsc ? 1 : -1;
          return 0;
        });
    }

    function getFilteredFichaMembers() {
      if (!appState.fichaSearch.trim()) return [];
      
      const searchLower = appState.fichaSearch.toLowerCase();
      return appState.members.filter(item => 
        item.nome.toLowerCase().includes(searchLower) || 
        item.matricula.includes(searchLower) || 
        item.id.toString() === searchLower
      );
    }

    function handleMarkNotificationsAsRead() {
      if (appState.authState.user) {
        appState.members = appState.members.map(m => 
          m.id === appState.authState.user.id 
            ? { ...m, notifications: m.notifications?.map(n => ({ ...n, read: true })) }
            : m
        );
        render();
      }
    }

    function setActiveTab(tab) {
      appState.activeAdminTab = tab;
      if (tab !== 'ficha_individual') {
        appState.selectedFichaMemberId = null;
        appState.activeFichaSection = null;
      }
      render();
    }

    function toggleMobileMenu() {
      appState.isMobileMenuOpen = !appState.isMobileMenuOpen;
      render();
    }

    function setFilterStatus(status) {
      appState.filterStatus = status;
      render();
    }

    function selectFichaMember(id) {
      appState.selectedFichaMemberId = id;
      appState.activeAdminTab = 'ficha_individual';
      appState.activeFichaSection = null;
      render();
    }

    function setActiveFichaSection(section) {
      appState.activeFichaSection = section;
      if (section === 'Dados Principais' && appState.selectedFichaMemberId) {
        const member = appState.members.find(m => m.id === appState.selectedFichaMemberId);
        if (member) {
          appState.fichaFormData = { ...member };
        }
      }
      render();
    }

    function updateFichaFormData(field, value) {
      if (!appState.fichaFormData) appState.fichaFormData = {};
      appState.fichaFormData[field] = value;
    }

    function saveFichaData() {
      if (appState.selectedFichaMemberId && appState.fichaFormData) {
        const currentMs = generateId();
        const newNotification = {
          id: currentMs.toString(),
          message: 'Sua ficha individual (Dados Principais) foi atualizada pelo administrador.',
          date: new Date().toISOString(),
          read: false
        };
        
        appState.members = appState.members.map(m => 
          m.id === appState.selectedFichaMemberId 
            ? { ...m, ...appState.fichaFormData, notifications: [newNotification, ...(m.notifications || [])] }
            : m
        );
        showToast('Dados Principais atualizados com sucesso!', 'success');
      }
    }

    function setupFormEventListeners() {
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => setDebouncedSearch(e.target.value));
      }

      const fichaSearchInput = document.getElementById('ficha-search-input');
      if (fichaSearchInput) {
        fichaSearchInput.addEventListener('input', (e) => setDebouncedFichaSearch(e.target.value));
      }

      const excelInput = document.getElementById('excel-input');
      if (excelInput) {
        excelInput.addEventListener('change', handleImportExcel);
      }
    }

    // ============================================
    // FUNÇÕES DE RENDERIZAÇÃO
    // ============================================

        return `
          <div class="flex-1 overflow-auto p-4 md:p-6">
            <h3 class="text-lg font-medium text-slate-900 mb-4">Módulo Administrativo</h3>
            <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
              <button onclick="setActiveTab('ficha_individual')" class="bg-white p-4 md:p-8 rounded-lg border border-slate-200 flex flex-col items-center justify-center gap-2 md:gap-4 hover:bg-slate-50 hover:border-blue-300 hover:shadow-md transition-all group">
                <div class="w-10 h-10 md:w-16 md:h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors">
                  <i data-lucide="file-text" class="w-5 h-5 md:w-8 md:h-8"></i>
                </div>
                <span class="font-medium text-slate-800 text-sm md:text-lg">Ficha Individual</span>
              </button>
            </div>
          </div>
        `;
      }

      if (appState.activeAdminTab === 'ficha_individual') {
        const member = appState.selectedFichaMemberId ? appState.members.find(m => m.id === appState.selectedFichaMemberId) : null;
        
        if (!member) {
          return `
            <div class="flex-1 overflow-auto p-4 md:p-6 flex flex-col gap-4">
              <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex flex-col md:flex-row gap-3 items-center shrink-0">
                <div class="flex items-center gap-3 text-slate-800 font-semibold flex-1">
                  <button onclick="setActiveTab('administrativo')" class="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition-colors">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                  </button>
                  <span>Ficha Individual</span>
                </div>
                <div class="relative flex-1 md:w-auto md:min-w-[300px]">
                  <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input id="ficha-search-input" type="text" placeholder="Buscar por nome, matrícula ou ID..." class="w-full pl-9 pr-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-white text-slate-900" value="${appState.fichaSearch}" />
                </div>
              </div>
              <div class="bg-white flex-1 min-h-[400px] rounded-lg border border-slate-200 flex flex-col items-center justify-center text-slate-500 p-8 shadow-sm">
                <i data-lucide="file-text" class="w-16 h-16 text-slate-300 mb-4"></i>
                <h3 class="text-xl font-medium text-slate-900 mb-2">Ficha Individual</h3>
                <p class="text-center max-w-md">Utilize a busca acima para encontrar um policial.</p>
              </div>
            </div>
          `;
        }

        return `
          <div class="flex-1 overflow-auto p-4 md:p-6 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex items-center gap-3 shrink-0">
              <button onclick="setActiveTab('administrativo'); appState.selectedFichaMemberId = null;" class="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
              </button>
              <span class="font-semibold">${member.patente} ${member.nome}</span>
            </div>
            <div class="bg-white flex-1 rounded-lg border border-slate-200 p-6 shadow-sm">
              <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                <button onclick="setActiveFichaSection('Dados Principais')" class="bg-slate-50 border border-slate-200 rounded-lg p-3 md:p-4 flex flex-col items-center justify-center gap-2 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 transition-colors">
                  <i data-lucide="user" class="w-5 h-5 md:w-8 md:h-8 text-slate-400"></i>
                  <span class="text-[10px] md:text-sm font-medium text-center">Dados Principais</span>
                </button>
                <button onclick="window.print()" class="bg-blue-600 border border-blue-700 rounded-lg p-3 md:p-4 flex flex-col items-center justify-center gap-2 hover:bg-blue-700 text-white transition-colors">
                  <i data-lucide="printer" class="w-5 h-5 md:w-8 md:h-8"></i>
                  <span class="text-[10px] md:text-sm font-medium">Gerar Ficha</span>
                </button>
              </div>
            </div>
          </div>
        `;
      }

      return '';
    }

    // ============================================
    // FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO
    // ============================================

    function render() {
      if (appState.isLoadingData) {
        const container = document.getElementById('app');
        container.innerHTML = `
          <div class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
            <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <h2 class="text-xl font-semibold text-slate-700">Carregando dados...</h2>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      if (appState.authState.role === null) {
        renderLoginScreen();
      } else if (appState.authState.role === 'USER') {
        renderUserDashboard();
      } else if (appState.authState.role === 'ADMIN') {
        renderAdminDashboard();
      }
    }

    // ============================================
    // INICIALIZAÇÃO
    // ============================================

    document.addEventListener('DOMContentLoaded', () => {
      render();
      
      setInterval(() => {
        if (appState.authState.role === 'ADMIN') {
          render();
        }
      }, 1000);
    });

    // Expose functions globally
    window.handleLogout = handleLogout;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.handleDelete = handleDelete;
    window.handleSort = handleSort;
    window.handleExportCSV = handleExportCSV;
    window.setActiveTab = setActiveTab;
    window.setFilterStatus = setFilterStatus;
    window.selectFichaMember = selectFichaMember;
    window.setActiveFichaSection = setActiveFichaSection;
    window.updateFichaFormData = updateFichaFormData;
    window.saveFichaData = saveFichaData;
  </script>
</body>
</html>
